services:
  postgres:
    image: postgres:16
    container_name: fraud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fraud_analytics
      POSTGRES_USER: fraud_admin
      POSTGRES_PASSWORD: fraud_admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_admin -d fraud_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: fraud-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres_data:
