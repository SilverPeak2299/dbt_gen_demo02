name: Publish Static Pipeline Docs

on:
  push:
    branches:
      - main
    paths:
      - "fraud_analytics_pipeline/docs/**"
      - "fraud_analytics_pipeline/design/**"
      - "fraud_analytics_pipeline/mappings/**"
      - "fraud_analytics_pipeline/models/**"
      - "fraud_analytics_pipeline/scripts/build_static_docs.py"
      - ".github/workflows/publish-static-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build static documentation
        run: python fraud_analytics_pipeline/scripts/build_static_docs.py fraud_analytics_pipeline site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: fraud_analytics_pipeline/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
