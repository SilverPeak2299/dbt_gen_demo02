name: Publish Static Pipeline Docs

on:
  push:
    branches:
      - {{default_branch}}
    paths:
      - "docs/**"
      - "design/**"
      - "mappings/**"
      - "models/**"
      - "scripts/build_static_docs.py"
      - ".github/workflows/{{workflow_filename}}"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "{{python_version}}"

      - name: Build static documentation
        run: {{static_build_command}}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: {{site_output_path}}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
